name: khata_pro
description: "KhataPro — bookkeeping app for small shop owners in India."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.0.17
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  alchemist: ^0.14.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/google_fonts/
