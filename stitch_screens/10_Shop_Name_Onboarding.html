<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#2f3131",
                    "surface-container-high": "#e8e8e8",
                    "surface-tint": "#005db7",
                    "on-tertiary-fixed": "#410003",
                    "surface": "#f9f9f9",
                    "surface-bright": "#f9f9f9",
                    "error": "#ba1a1a",
                    "on-background": "#1a1c1c",
                    "secondary-fixed": "#a3f69c",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#d6e3ff",
                    "surface-container": "#eeeeee",
                    "on-primary-fixed": "#001b3d",
                    "tertiary-container": "#c42627",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#93000e",
                    "on-primary-fixed-variant": "#00468c",
                    "inverse-primary": "#a9c7ff",
                    "primary-fixed-dim": "#a9c7ff",
                    "primary-container": "#1565c0",
                    "error-container": "#ffdad6",
                    "secondary": "#1b6d24",
                    "tertiary-fixed": "#ffdad6",
                    "on-secondary-container": "#217128",
                    "primary": "#004d99",
                    "outline-variant": "#c2c6d4",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-container": "#a0f399",
                    "on-surface": "#1a1c1c",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#002204",
                    "on-primary-container": "#dae5ff",
                    "secondary-fixed-dim": "#88d982",
                    "on-secondary-fixed-variant": "#005312",
                    "inverse-on-surface": "#f1f1f1",
                    "outline": "#727783",
                    "background": "#f9f9f9",
                    "surface-variant": "#e2e2e2",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f3f3f3",
                    "surface-dim": "#dadada",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "tertiary": "#a00312",
                    "on-tertiary-container": "#ffddd9",
                    "on-surface-variant": "#424752"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F2F3F5;
            -webkit-tap-highlight-color: transparent;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Header / Progress Area (Supressed Standard TopAppBar for focused task) -->
<header class="fixed top-0 left-0 right-0 z-50 safe-top">
<div class="flex items-center justify-between h-16 px-4">
<!-- Back Button - Data coming from TopAppBar JSON logic but customized for Onboarding context -->
<button class="w-12 h-12 flex items-center justify-center bg-white/40 backdrop-blur-md rounded-full active:scale-95 transition-transform text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<!-- 2-dot Progress Indicator -->
<div class="flex gap-2 mr-4">
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</header>
<main class="min-h-screen flex flex-col px-6 safe-top pb-40">
<!-- Content Section -->
<div class="flex-grow flex flex-col items-center justify-start pt-12 md:pt-20 max-w-md mx-auto w-full">
<!-- Illustration Area -->
<div class="w-[120px] h-[120px] mb-10 flex items-center justify-center relative">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-2xl"></div>
<div class="relative w-full h-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[80px]" data-icon="store" style="font-variation-settings: 'FILL' 1;">store</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="text-center mb-10">
<h1 class="font-headline font-bold text-3xl tracking-tight text-on-surface mb-3">
                    What's your shop called?
                </h1>
<p class="text-on-surface-variant text-sm md:text-base leading-relaxed">
                    This name will appear on your reminders.
                </p>
</div>
<!-- Input Field Group -->
<div class="w-full space-y-2">
<label class="font-headline font-semibold text-xs uppercase tracking-wider text-on-surface-variant ml-4" for="shop-name">
                    Business Name
                </label>
<div class="relative">
<input class="w-full h-14 px-6 bg-surface-container-high border-none rounded-full text-lg font-medium text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all outline-none" id="shop-name" placeholder="Raju Kirana Store" type="text"/>
</div>
</div>
<!-- Bento Hint / Card (Asymmetric Layout Element) -->
<div class="mt-12 p-5 bg-white rounded-3xl w-full shadow-sm border border-white/50 flex gap-4 items-start">
<div class="p-2 bg-secondary-container rounded-xl text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>
<div>
<p class="font-semibold text-sm text-on-surface">Private &amp; Secure</p>
<p class="text-xs text-on-surface-variant mt-0.5">Your data is encrypted and only visible to you.</p>
</div>
</div>
</div>
</main>
<!-- Sticky Footer (Mapping from Footer JSON structure with active onboarding logic) -->
<footer class="fixed bottom-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-xl rounded-t-[32px] shadow-[0_-8px_30px_rgb(0,0,0,0.04)] border-t border-white/20 safe-bottom">
<div class="flex flex-col items-center gap-4 p-6 pb-10 w-full max-w-md mx-auto">
<!-- Primary CTA -->
<button class="w-full h-14 bg-primary text-white font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center">
                Continue
            </button>
<!-- Secondary Action (Skip for now from JSON) -->
<button class="text-primary font-headline font-semibold text-sm hover:text-primary-container transition-colors py-2">
                Skip for now
            </button>
</div>
</footer>
<!-- Image for decorative reference (hidden) -->
<div class="hidden">
<img data-alt="minimalist modern indian grocery storefront with clean lines and deep indigo brand accents professional digital illustration style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBt6wAOE2Vj-sRXdEH7zzp4kOZDbvzA2eSDeB7mQ3JDIdL0cYJGWjZPBAGuIXDxQfHv-PFN-yKwcFQ9A661nB9pbN41ZBfxQe4eB1CTEwzwXKQ_MgThtpA9X23K9DG46Jpg9DmZCejXacV-X-lLatWu46XCWC3hdFxQqEUG8dkNYoX4wu6842b_v0ohiTXDPckKFnuXqrZmdOV9CFXVyFZf_80Qa1mtSLMqQKaSkdZrckw_gkAwl9t_Rktvhntj3RKnGZjFDkCewwA"/>
</div>
</body></html>
