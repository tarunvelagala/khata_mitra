<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#727783",
                    "on-surface": "#1a1c1c",
                    "error": "#ba1a1a",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#c42627",
                    "primary-container": "#1565c0",
                    "background": "#f9f9f9",
                    "tertiary": "#a00312",
                    "on-tertiary-container": "#ffddd9",
                    "primary": "#004d99",
                    "secondary": "#1b6d24",
                    "surface-container": "#eeeeee",
                    "secondary-fixed": "#a3f69c",
                    "surface-container-high": "#e8e8e8",
                    "error-container": "#ffdad6",
                    "on-background": "#1a1c1c",
                    "secondary-fixed-dim": "#88d982",
                    "inverse-surface": "#2f3131",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary-fixed": "#002204",
                    "outline-variant": "#c2c6d4",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "on-primary-fixed": "#001b3d",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "on-tertiary": "#ffffff",
                    "inverse-on-surface": "#f1f1f1",
                    "inverse-primary": "#a9c7ff",
                    "on-tertiary-fixed-variant": "#93000e",
                    "on-secondary": "#ffffff",
                    "primary-fixed-dim": "#a9c7ff",
                    "surface-container-low": "#f3f3f3",
                    "surface-tint": "#005db7",
                    "on-tertiary-fixed": "#410003",
                    "on-primary-container": "#dae5ff",
                    "tertiary-fixed": "#ffdad6",
                    "on-secondary-container": "#217128",
                    "surface-bright": "#f9f9f9",
                    "secondary-container": "#a0f399",
                    "on-secondary-fixed-variant": "#005312",
                    "surface-container-lowest": "#ffffff",
                    "on-surface-variant": "#424752",
                    "primary-fixed": "#d6e3ff",
                    "on-primary-fixed-variant": "#00468c",
                    "surface-dim": "#dadada",
                    "surface": "#f9f9f9"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F3F5; }
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface select-none">
<!-- Top AppBar (JSON Component) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-500 dark:text-zinc-400">arrow_back</span>
<h1 class="font-plus-jakarta text-xl font-bold tracking-tight text-blue-800 dark:text-blue-400">Settings</h1>
</div>
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg">person</span>
</div>
</header>
<main class="pt-20 pb-40 px-4 space-y-6">
<!-- SECTION 1: BUSINESS -->
<section>
<h2 class="px-2 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 font-label">BUSINESS</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
<!-- Business Name -->
<button class="w-full flex items-center justify-between p-4 transition-colors duration-200 hover:bg-zinc-50 border-b border-zinc-100/50">
<div class="text-left">
<p class="text-sm font-semibold text-on-surface-variant">Business Name</p>
<p class="text-base font-bold text-on-surface">Raju Kirana Store</p>
</div>
<span class="material-symbols-outlined text-zinc-400">chevron_right</span>
</button>
<!-- Edit Visiting Card -->
<button class="w-full flex items-center justify-between p-4 transition-colors duration-200 hover:bg-zinc-50">
<div class="text-left">
<p class="text-base font-semibold text-on-surface">Edit Visiting Card</p>
<p class="text-xs text-on-surface-variant">Card shown in reminders</p>
</div>
<span class="material-symbols-outlined text-zinc-400">chevron_right</span>
</button>
</div>
</section>
<!-- SECTION 2: PREFERENCES -->
<section>
<h2 class="px-2 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 font-label">PREFERENCES</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
<!-- Language -->
<div class="w-full flex items-center justify-between p-4 border-b border-zinc-100/50">
<p class="text-base font-semibold text-on-surface">Language</p>
<div class="px-3 py-1 rounded-full border border-primary/30 text-primary text-xs font-bold bg-primary/5">
                        English
                    </div>
</div>
<!-- Theme -->
<button class="w-full flex items-center justify-between p-4 transition-colors duration-200 hover:bg-zinc-50">
<p class="text-base font-semibold text-on-surface">Theme</p>
<div class="flex items-center gap-2">
<span class="text-sm text-on-surface-variant">System default</span>
<span class="material-symbols-outlined text-zinc-400">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- SECTION 3: NOTIFICATIONS -->
<section>
<h2 class="px-2 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 font-label">NOTIFICATIONS</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
<div class="w-full flex items-center justify-between p-4">
<p class="text-base font-semibold text-on-surface">Payment reminders</p>
<!-- Material 3 Toggle Switch (Active) -->
<div class="relative inline-flex items-center cursor-pointer">
<div class="w-12 h-6 bg-primary rounded-full"></div>
<div class="absolute right-1 w-4 h-4 bg-white rounded-full transition-all"></div>
</div>
</div>
</div>
</section>
<!-- SECTION 4: ABOUT -->
<section>
<h2 class="px-2 mb-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 font-label">ABOUT</h2>
<div class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden">
<!-- App Version -->
<div class="w-full flex items-center justify-between p-4 border-b border-zinc-100/50">
<p class="text-base font-semibold text-on-surface">App version</p>
<p class="text-sm text-zinc-400 font-medium">1.0.0 (build 1)</p>
</div>
<!-- Open source licences -->
<button class="w-full flex items-center justify-between p-4 transition-colors duration-200 hover:bg-zinc-50">
<p class="text-base font-semibold text-on-surface">Open source licences</p>
<span class="material-symbols-outlined text-zinc-400">chevron_right</span>
</button>
</div>
</section>
<!-- Profile Card Teaser -->
<div class="relative w-full h-32 rounded-2xl overflow-hidden bg-primary-container p-4 flex flex-col justify-between" style="background-image: linear-gradient(135deg, #004d99 0%, #1565c0 100%);">
<div class="flex justify-between items-start">
<div class="bg-white/20 p-2 rounded-lg backdrop-blur-md">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<div class="text-right">
<p class="text-white/70 text-[10px] font-bold tracking-widest uppercase">Member Since</p>
<p class="text-white font-bold">JAN 2024</p>
</div>
</div>
<div>
<p class="text-white/60 text-xs font-medium">Account Security Level</p>
<div class="w-full h-1.5 bg-white/20 rounded-full mt-1">
<div class="w-3/4 h-full bg-secondary-fixed rounded-full shadow-[0_0_8px_rgba(163,246,156,0.6)]"></div>
</div>
</div>
</div>
</main>
<!-- Sticky Footer (Sign Out Button) -->
<div class="fixed bottom-[88px] left-0 w-full px-4 z-40">
<button class="w-full h-14 bg-white border-2 border-tertiary text-tertiary font-bold rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform duration-150 shadow-lg">
<span class="material-symbols-outlined">logout</span>
            Sign Out
        </button>
</div>
<!-- BottomNavBar (JSON Component) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-6 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-lg rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 py-2 px-4 transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="home_app_logo">home_app_logo</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 py-2 px-4 transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Ledger</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 py-2 px-4 transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="assessment">assessment</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Reports</span>
</div>
<div class="flex flex-col items-center justify-center bg-blue-100/50 dark:bg-blue-900/30 text-blue-900 dark:text-blue-200 rounded-2xl py-2 px-4 transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="settings" style="font-variation-settings: 'FILL' 1;">settings</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Settings</span>
</div>
</nav>
</body></html>
