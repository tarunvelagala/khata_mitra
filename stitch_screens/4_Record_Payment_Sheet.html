<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Payment | KhataMitra</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar suppression for a cleaner app feel */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-lowest": "#ffffff",
                      "surface-container": "#eeeeee",
                      "on-secondary-container": "#217128",
                      "on-error": "#ffffff",
                      "error-container": "#ffdad6",
                      "secondary-fixed": "#a3f69c",
                      "on-secondary": "#ffffff",
                      "inverse-on-surface": "#f1f1f1",
                      "on-surface-variant": "#424752",
                      "on-primary-fixed": "#001b3d",
                      "on-secondary-fixed": "#002204",
                      "on-primary-fixed-variant": "#00468c",
                      "primary-fixed": "#d6e3ff",
                      "on-secondary-fixed-variant": "#005312",
                      "surface-container-low": "#f3f3f3",
                      "secondary-fixed-dim": "#88d982",
                      "on-tertiary-fixed-variant": "#93000e",
                      "surface-container-high": "#e8e8e8",
                      "tertiary-fixed-dim": "#ffb4ac",
                      "surface-dim": "#dadada",
                      "tertiary-container": "#c42627",
                      "surface-tint": "#005db7",
                      "on-primary": "#ffffff",
                      "on-background": "#1a1c1c",
                      "surface-container-highest": "#e2e2e2",
                      "inverse-surface": "#2f3131",
                      "background": "#f9f9f9",
                      "error": "#ba1a1a",
                      "primary-container": "#1565c0",
                      "secondary-container": "#a0f399",
                      "on-tertiary": "#ffffff",
                      "surface-bright": "#f9f9f9",
                      "primary-fixed-dim": "#a9c7ff",
                      "on-primary-container": "#dae5ff",
                      "inverse-primary": "#a9c7ff",
                      "outline-variant": "#c2c6d4",
                      "tertiary-fixed": "#ffdad6",
                      "primary": "#004d99",
                      "on-error-container": "#93000a",
                      "tertiary": "#a00312",
                      "on-tertiary-container": "#ffddd9",
                      "on-tertiary-fixed": "#410003",
                      "secondary": "#1b6d24",
                      "on-surface": "#1a1c1c",
                      "outline": "#727783",
                      "surface": "#f9f9f9",
                      "surface-variant": "#e2e2e2"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans"],
                      "body": ["Inter"],
                      "label": ["Inter"]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-zinc-200 font-body text-on-background min-h-screen flex flex-col justify-end">
<!-- Backdrop overlay -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-0"></div>
<!-- Main Content Underlay (Mocking the Customer Profile for Context) -->
<main class="fixed top-0 left-0 w-full h-full p-6 z-0 pointer-events-none opacity-40">
<header class="flex justify-between items-center mb-8">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</div>
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</div>
</header>
<div class="space-y-4">
<div class="h-8 w-48 bg-white rounded-lg"></div>
<div class="h-24 w-full bg-white rounded-2xl"></div>
<div class="h-24 w-full bg-white rounded-2xl"></div>
<div class="h-24 w-full bg-white rounded-2xl"></div>
</div>
</main>
<!-- Bottom Sheet Container -->
<section class="relative z-10 w-full max-w-lg mx-auto bg-surface rounded-t-[16px] shadow-2xl flex flex-col overflow-hidden max-h-[751px] animate-slide-up">
<!-- Drag Handle Indicator -->
<div class="w-full flex justify-center pt-3 pb-1">
<div class="w-10 h-1.5 bg-zinc-300 rounded-full"></div>
</div>
<!-- Header Section -->
<header class="px-5 py-4 bg-secondary-container flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'wght' 600;">north</span>
</div>
<div class="flex flex-col">
<h1 class="font-headline text-lg font-semibold text-secondary leading-tight">Record Payment</h1>
<span class="font-body text-sm text-outline">For: Ramesh Kumar</span>
</div>
</div>
<button class="w-8 h-8 rounded-full flex items-center justify-center bg-white/50 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">close</span>
</button>
</header>
<!-- Form Body -->
<div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Amount Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant">Amount (₹) *</label>
<div class="relative flex items-center">
<div class="absolute left-4 font-headline text-2xl font-bold text-on-surface">₹</div>
<input class="w-full h-[64px] bg-surface-container-high border-none rounded-xl pl-12 pr-4 font-headline text-2xl font-bold text-secondary focus:ring-2 focus:ring-secondary/20 focus:bg-white transition-all placeholder:text-zinc-400" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Note Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant">Note (optional)</label>
<div class="relative">
<textarea class="w-full bg-surface-container-high border-none rounded-xl p-4 font-body text-on-surface focus:ring-2 focus:ring-secondary/20 focus:bg-white transition-all resize-none placeholder:text-outline/60" maxlength="200" placeholder="What is this payment for?" rows="3"></textarea>
<div class="absolute bottom-3 right-3 text-[10px] font-medium text-outline">0 / 200</div>
</div>
</div>
<!-- Date Row -->
<div class="flex items-center justify-between py-2">
<span class="font-label text-sm font-semibold text-on-surface-variant">Date</span>
<button class="flex items-center gap-2 bg-primary-fixed px-4 py-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-primary-fixed text-[18px]">calendar_today</span>
<span class="font-label text-sm font-bold text-on-primary-fixed">Today, 4 Jan</span>
</button>
</div>
<!-- Additional Context - Digital Ledger Aesthetic -->
<div class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/10">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-secondary text-[20px]">info</span>
<p class="font-body text-[13px] leading-snug text-on-surface-variant">
                        This entry will be recorded in your digital ledger and synced with Ramesh Kumar's account.
                    </p>
</div>
</div>
</div>
<!-- Sticky Footer -->
<footer class="p-6 bg-surface border-t border-surface-container-high">
<button class="w-full h-14 bg-secondary text-white rounded-full flex items-center justify-center gap-3 font-headline font-bold text-lg shadow-lg active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 700;">check</span>
                Save Payment
            </button>
<!-- iOS Home Indicator Spacer -->
<div class="h-6"></div>
</footer>
</section>
<!-- Shared Components Integration Mockup (TopAppBar and BottomNavBar as per JSON but suppressed for modal focus) -->
<!-- The TopAppBar and BottomNavBar are suppressed here because the Task is a "Record Payment bottom sheet" which is a focused Transactional journey. -->
<style>
        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</body></html>
