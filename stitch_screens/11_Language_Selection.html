<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KhataMitra - Select Language</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e2e2e2",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#c42627",
                        "on-tertiary-container": "#ffddd9",
                        "on-surface-variant": "#424752",
                        "on-primary-container": "#dae5ff",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-primary-fixed-variant": "#00468c",
                        "surface-container": "#eeeeee",
                        "surface-variant": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#93000e",
                        "secondary-fixed-dim": "#88d982",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#a9c7ff",
                        "outline": "#727783",
                        "on-tertiary-fixed": "#410003",
                        "on-secondary-fixed": "#002204",
                        "on-primary-fixed": "#001b3d",
                        "on-background": "#1a1c1c",
                        "surface-tint": "#005db7",
                        "secondary-fixed": "#a3f69c",
                        "tertiary-fixed": "#ffdad6",
                        "surface": "#f9f9f9",
                        "primary-container": "#1565c0",
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-high": "#e8e8e8",
                        "background": "#f9f9f9",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3f3",
                        "outline-variant": "#c2c6d4",
                        "tertiary": "#a00312",
                        "on-secondary-fixed-variant": "#005312",
                        "on-secondary-container": "#217128",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb4ac",
                        "secondary": "#1b6d24",
                        "inverse-surface": "#2f3131",
                        "primary-fixed": "#d6e3ff",
                        "primary": "#004d99",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "secondary-container": "#a0f399",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F2F3F5;
            font-family: 'Inter', sans-serif;
        }
        .app-icon-gradient {
            background: #d6e3ff;
        }
        .selected-language {
            border: 2px solid #004d99;
            background-color: rgba(214, 227, 255, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-background antialiased">
<!-- Top Area: Brand Identity -->
<header class="flex flex-col items-center pt-16 pb-12 px-6">
<!-- App Icon -->
<div class="app-icon-gradient w-20 h-20 rounded-2xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<!-- Wordmark -->
<h1 class="font-headline font-extrabold text-2xl text-primary tracking-tight mb-2">KhataMitra</h1>
<!-- Multi-language Tagline -->
<div class="flex flex-col items-center space-y-1">
<p class="text-on-surface-variant font-body text-sm">Choose your language</p>
<p class="text-on-surface-variant font-body text-sm">अपनी भाषा चुनें</p>
<p class="text-on-surface-variant font-body text-sm">మీ భాష ఎంచుకోండి</p>
</div>
</header>
<!-- Language Selection List -->
<main class="flex-grow px-4 pb-32">
<div class="max-w-md mx-auto space-y-4">
<!-- Language Card: English (Selected) -->
<button class="w-full text-left p-4 rounded-2xl bg-surface-container-lowest flex items-center selected-language transition-all duration-200 ring-1 ring-primary/10">
<div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center mr-4">
<span class="font-headline font-bold text-primary">EN</span>
</div>
<div class="flex-grow">
<h2 class="font-headline font-bold text-lg text-on-surface">English</h2>
<p class="font-body text-sm text-on-surface-variant">Continue in English</p>
</div>
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-sm" data-icon="check" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
<!-- Language Card: Hindi -->
<button class="w-full text-left p-4 rounded-2xl bg-surface-container-lowest flex items-center hover:bg-surface-container-high transition-all duration-200 border-2 border-transparent">
<div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center mr-4">
<span class="font-headline font-bold text-primary">हि</span>
</div>
<div class="flex-grow">
<h2 class="font-headline font-bold text-lg text-on-surface">हिंदी</h2>
<p class="font-body text-sm text-on-surface-variant">हिंदी में जारी रखें</p>
</div>
</button>
<!-- Language Card: Telugu -->
<button class="w-full text-left p-4 rounded-2xl bg-surface-container-lowest flex items-center hover:bg-surface-container-high transition-all duration-200 border-2 border-transparent">
<div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center mr-4">
<span class="font-headline font-bold text-primary">తె</span>
</div>
<div class="flex-grow">
<h2 class="font-headline font-bold text-lg text-on-surface">తెలుగు</h2>
<p class="font-body text-sm text-on-surface-variant">తెలుగులో కొనసాగించండి</p>
</div>
</button>
</div>
</main>
<!-- Sticky Footer: Primary Action -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest/80 backdrop-blur-md px-6 pt-4 pb-8 md:pb-10">
<div class="max-w-md mx-auto">
<button class="w-full py-4 bg-primary text-on-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-200">
                Continue
            </button>
<!-- iOS Safe Area Spacer -->
<div class="h-2"></div>
</div>
</footer>
</body></html>
