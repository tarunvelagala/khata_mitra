<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>KhataMitra Theme Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "surface-dim": "#dadada",
                    "on-surface": "#1a1c1c",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#88d982",
                    "inverse-surface": "#2f3131",
                    "primary": "#004d99",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "surface-tint": "#005db7",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#1565c0",
                    "tertiary": "#a00312",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005312",
                    "on-tertiary-container": "#ffddd9",
                    "on-secondary-fixed": "#002204",
                    "on-primary-container": "#dae5ff",
                    "surface-container": "#eeeeee",
                    "outline-variant": "#c2c6d4",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdad6",
                    "on-background": "#1a1c1c",
                    "inverse-primary": "#a9c7ff",
                    "on-secondary": "#ffffff",
                    "outline": "#727783",
                    "on-tertiary-fixed-variant": "#93000e",
                    "primary-fixed-dim": "#a9c7ff",
                    "on-tertiary-fixed": "#410003",
                    "surface": "#f9f9f9",
                    "surface-container-highest": "#e2e2e2",
                    "surface-bright": "#f9f9f9",
                    "secondary-container": "#a0f399",
                    "tertiary-container": "#c42627",
                    "inverse-on-surface": "#f1f1f1",
                    "on-primary-fixed": "#001b3d",
                    "secondary-fixed": "#a3f69c",
                    "primary-fixed": "#d6e3ff",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#424752",
                    "surface-variant": "#e2e2e2",
                    "secondary": "#1b6d24",
                    "background": "#f9f9f9",
                    "on-primary-fixed-variant": "#00468c",
                    "surface-container-low": "#f3f3f3",
                    "on-secondary-container": "#217128",
                    "surface-container-high": "#e8e8e8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F2F3F5;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ios-safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased text-on-surface">
<main class="min-h-screen flex flex-col items-center px-6 pt-16 pb-32 max-w-lg mx-auto">
<!-- App Icon & Branding Section -->
<header class="flex flex-col items-center mb-10 text-center">
<div class="w-20 h-20 bg-[#D6E4FF] rounded-3xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="menu_book" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<h1 class="font-headline font-extrabold text-primary text-[22px] tracking-tight leading-none mb-2">KhataMitra</h1>
<p class="text-on-surface-variant font-medium text-sm">Choose your theme</p>
</header>
<!-- Selection Cards Container -->
<section class="w-full space-y-4">
<!-- Light Theme Card (Selected) -->
<button class="w-full text-left bg-primary-fixed border-[2px] border-primary rounded-3xl p-4 flex items-center transition-all duration-200">
<div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary" data-icon="light_mode">light_mode</span>
</div>
<div class="flex-1">
<div class="font-headline font-bold text-on-surface text-base">Light</div>
<div class="text-on-surface-variant text-xs font-medium">Bright white background</div>
</div>
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Dark Theme Card -->
<button class="w-full text-left bg-surface-container-lowest border-[1.5px] border-outline-variant/30 rounded-3xl p-4 flex items-center transition-all duration-200 hover:bg-surface-container-low">
<div class="w-10 h-10 rounded-xl bg-on-surface flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-white" data-icon="dark_mode">dark_mode</span>
</div>
<div class="flex-1">
<div class="font-headline font-bold text-on-surface text-base">Dark</div>
<div class="text-on-surface-variant text-xs font-medium">Easy on the eyes at night</div>
</div>
</button>
<!-- System Default Card -->
<button class="w-full text-left bg-surface-container-lowest border-[1.5px] border-outline-variant/30 rounded-3xl p-4 flex items-center transition-all duration-200 hover:bg-surface-container-low">
<div class="w-10 h-10 rounded-xl bg-primary-fixed flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary" data-icon="contrast">contrast</span>
</div>
<div class="flex-1">
<div class="font-headline font-bold text-on-surface text-base">System Default</div>
<div class="text-on-surface-variant text-xs font-medium">Follows your phone setting</div>
</div>
</button>
</section>
<!-- Illustration / Decor (Bento Grid feel) -->
<section class="mt-12 w-full grid grid-cols-2 gap-4">
<div class="bg-white/40 p-4 rounded-3xl h-32 flex flex-col justify-end">
<div class="w-8 h-8 rounded-full bg-secondary-container mb-auto"></div>
<div class="h-2 w-16 bg-outline-variant/20 rounded-full mb-1"></div>
<div class="h-2 w-10 bg-outline-variant/20 rounded-full"></div>
</div>
<div class="bg-white/40 p-4 rounded-3xl h-32 flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant/40 text-5xl" data-icon="brush">brush</span>
</div>
</section>
</main>
<!-- Sticky Footer Container -->
<footer class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-[#F2F3F5] via-[#F2F3F5]/90 to-transparent px-6 pt-8 pb-4 ios-safe-bottom">
<div class="max-w-lg mx-auto">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-headline font-bold text-base shadow-lg shadow-primary/20 active:scale-95 transition-transform duration-100 flex items-center justify-center">
                Continue
                
</button>
<!-- iOS Home Indicator Spacing -->
<div class="h-4"></div>
</div>
</footer>
</body></html>
